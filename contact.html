<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lena Yin 2026 - Contact</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0f172a;color:white;}
nav{position:sticky;top:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;gap:20px;padding:15px;z-index:1000;}
nav a{color:white;text-decoration:none;font-weight:bold;transition:0.3s;}
nav a:hover{color:#f7c600;}
section{padding:40px 20px;margin:20px auto;max-width:1000px;background:#1e293b;border-radius:15px;}
.fade{opacity:0;transform:translateY(30px);transition:0.8s;}
.fade.visible{opacity:1;transform:translateY(0);}
footer{text-align:center;padding:20px;background:black;}
footer a{color:#f7c600;margin:0 10px;text-decoration:none;}
footer a:hover{color:#ffd60a;}
</style>
</head>
<body>

<nav>
  <a href="index.html">Accueil</a>
  <a href="valeurs.html">Valeurs</a>
  <a href="priorites.html">Priorités</a>
  <a href="vision.html">Vision</a>
  <a href="contact.html">Contact</a>
</nav>

<section class="fade">
  <h2>📩 Contact</h2>
  <p>Pour toute question ou suggestion, vous pouvez me contacter directement par email :</p>
  <p><strong>Email :</strong> <a href="mailto:lena@example.com" style="color:#f7c600;">lena@example.com</a></p>
  <p>Ou via les réseaux sociaux :</p>
  <p>
    <a href="https://facebook.com" target="_blank">Facebook</a> | 
    <a href="https://twitter.com" target="_blank">Twitter</a> | 
    <a href="https://instagram.com" target="_blank">Instagram</a>
  </p>
</section>

<footer>
  <p>Unissons-nous pour faire avancer Orléans !</p>
</footer>

<script>
const elements=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
  elements.forEach(el=>{
    const pos=el.getBoundingClientRect().top;
    if(pos<window.innerHeight-50){ el.classList.add('visible'); }
  });
});
</script>

</body>
</html>
