<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lena Yin 2026 - Priorités</title>
<link rel="icon" href="https://via.placeholder.com/32" type="image/png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0f172a;color:white;}
nav{position:sticky;top:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;gap:20px;padding:15px;z-index:1000;}
nav a{color:white;text-decoration:none;font-weight:bold;transition:0.3s;}
nav a:hover{color:#f7c600;}
section{padding:40px 20px;margin:20px auto;max-width:1000px;background:#1e293b;border-radius:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;}
.card{padding:20px;border-radius:10px;text-align:center;font-weight:bold;transition:0.3s;cursor:default;}
.card:hover{transform:scale(1.05);}
.yellow{background:#f7c600;color:#0f172a;}
.red{background:#d62828;}
.orange{background:#f77f00;}
.purple{background:#7b2cbf;}
.blue{background:#3a86ff;}
.fade{opacity:0;transform:translateY(30px);transition:0.8s;}
.fade.visible{opacity:1;transform:translateY(0);}
footer{text-align:center;padding:20px;background:black;}
footer a{color:#f7c600;margin:0 10px;text-decoration:none;}
footer a:hover{color:#ffd60a;}
</style>
</head>
<body>

<nav>
  <a href="index.html">Accueil</a>
  <a href="valeurs.html">Valeurs</a>
  <a href="priorites.html">Priorités</a>
  <a href="vision.html">Vision</a>
  <a href="contact.html">Contact</a>
</nav>

<section class="fade">
  <h2>🏙️ Nos priorités</h2>
  <div class="grid">
    <div class="card yellow">Logement</div>
    <div class="card red">Égalité</div>
    <div class="card orange">Jeunesse</div>
    <div class="card purple">Santé</div>
    <div class="card blue">Services publics</div>
  </div>
</section>

<footer>
  <p>Unissons-nous pour faire avancer Orléans !</p>
</footer>

<script>
const elements=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
  elements.forEach(el=>{
    const pos=el.getBoundingClientRect().top;
    if(pos<window.innerHeight-50){ el.classList.add('visible'); }
  });
});
</script>

</body>
</html>
